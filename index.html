                <div className="fade-in max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                        <svg className="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        單字庫 Vocabulary ({vocabularyData.length})
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {vocabularyData.map((item, index) => (
                            <div key={index} className="p-4 rounded-xl border border-slate-100 hover:border-blue-200 hover:shadow-md transition-all bg-slate-50 hover:bg-white group">
                                <div className="flex items-baseline gap-2 mb-2">
                                    <h3 className="text-lg font-bold text-slate-900">{item.word}</h3>
                                    {item.phonetic && <span className="text-sm text-slate-500 font-mono">{item.phonetic}</span>}
                                    <span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">{item.partOfSpeech}</span>
                                </div>
                                <p className="text-slate-700 font-medium mb-2">{item.meaning}</p>
                                {item.example && (
                                    <div className="mt-3 text-sm border-l-2 border-slate-300 pl-3">
                                        <p className="text-slate-600 italic mb-1">{item.example}</p>
                                        <p className="text-slate-500">{item.exampleZh}</p>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ArticleReader = () => {
            return (
                <div className="fade-in max-w-4xl mx-auto space-y-8">
                    {articleData.map((article, idx) => (
                        <article key={idx} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                            <h2 className="text-2xl md:text-3xl font-bold mb-2 text-slate-900">{article.title}</h2>
                            <h3 className="text-lg text-slate-500 mb-6 font-medium">{article.titleZh}</h3>
                            <div className="space-y-6">
                                {article.paragraphs.map((p, pIdx) => (
                                    <div key={pIdx} className="group flex flex-col gap-2 p-4 -mx-4 rounded-xl hover:bg-slate-50 transition-colors">
                                        <p className="text-lg text-slate-800 leading-relaxed font-serif">{p.en}</p>
                                        <p className="text-md text-slate-500 leading-relaxed">{p.zh}</p>
                                    </div>
                                ))}
                            </div>
                        </article>
                    ))}
                </div>
            );
        };

        const Quiz = () => {
            const [currentQuestion, setCurrentQuestion] = React.useState(null);
            const [options, setOptions] = React.useState([]);
            const [selected, setSelected] = React.useState(null);
            const [isCorrect, setIsCorrect] = React.useState(null);
            const [score, setScore] = React.useState(0);
            const [totalAnswered, setTotalAnswered] = React.useState(0);

            const generateQuestion = () => {
                setSelected(null);
                setIsCorrect(null);
                
                // Randomly pick a correct word
                const correctIdx = Math.floor(Math.random() * vocabularyData.length);
                const correctWord = vocabularyData[correctIdx];
                
                // Pick 3 wrong options
                let wrongOptions = [];
                while(wrongOptions.length < 3) {
                    const wrongIdx = Math.floor(Math.random() * vocabularyData.length);
                    if(wrongIdx !== correctIdx && !wrongOptions.includes(vocabularyData[wrongIdx])) {
                        wrongOptions.push(vocabularyData[wrongIdx]);
                    }
                }
                
                // Shuffle options
                const allOptions = [correctWord, ...wrongOptions].sort(() => Math.random() - 0.5);
                
                // Determine question type (50% meaning, 50% example fill-in-blank if example exists)
                const isExampleType = correctWord.example && Math.random() > 0.5;
                
                let questionText = "";
                if(isExampleType) {
                    // Replace word in example with blanks (case insensitive)
                    const regex = new RegExp(correctWord.word, "gi");
                    questionText = correctWord.example.replace(regex, "________");
                } else {
                    questionText = `What is the English word for "${correctWord.meaning}"?`;
                }

                setCurrentQuestion({
                    type: isExampleType ? 'example' : 'meaning',
                    text: questionText,
                    answer: correctWord,
                    zhHint: isExampleType ? correctWord.exampleZh : null
                });
                setOptions(allOptions);
            };

            React.useEffect(() => {
                generateQuestion();
            }, []);

            const handleSelect = (option) => {
                if (selected) return; // Prevent double click
                setSelected(option);
                const correct = option.word === currentQuestion.answer.word;
                setIsCorrect(correct);
                setTotalAnswered(prev => prev + 1);
                if (correct) setScore(prev => prev + 1);
            };

            if (!currentQuestion) return null;

            return (
                <div className="fade-in max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">每日複習測驗 Daily Quiz</h2>
                    <p className="text-slate-500 mb-8">Score: {score} / {totalAnswered}</p>
                    
                    <div className="bg-blue-50 p-6 rounded-xl mb-8 min-h-[120px] flex flex-col justify-center">
                        <p className="text-xl font-medium text-slate-800 mb-2">{currentQuestion.text}</p>
                        {currentQuestion.zhHint && <p className="text-sm text-slate-500">{currentQuestion.zhHint}</p>}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        {options.map((opt, i) => {
                            let btnClass = "p-4 rounded-xl border-2 text-lg font-medium transition-all ";
                            if (!selected) {
                                btnClass += "border-slate-200 hover:border-blue-500 hover:bg-blue-50 text-slate-700";
                            } else {
                                if (opt.word === currentQuestion.answer.word) {
                                    btnClass += "border-green-500 bg-green-50 text-green-700"; // Correct answer is always green
                                } else if (selected.word === opt.word && !isCorrect) {
                                    btnClass += "border-red-500 bg-red-50 text-red-700"; // Wrong selected is red
                                } else {
                                    btnClass += "border-slate-100 bg-slate-50 text-slate-400"; // Others are faded
                                }
                            }

                            return (
                                <button key={i} onClick={() => handleSelect(opt)} className={btnClass} disabled={!!selected}>
                                    {opt.word}
                                </button>
                            );
                        })}
                    </div>

                    {selected && (
                        <div className="fade-in">
                            <p className={`text-lg font-bold mb-4 ${isCorrect ? 'text-green-600' : 'text-red-500'}`}>
                                {isCorrect ? '✨ Correct! 答對了！' : `❌ 答錯了！正確答案是: ${currentQuestion.answer.word}`}
                            </p>
                            <button onClick={generateQuestion} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium shadow-md transition-colors">
                                下一題 Next Question
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('vocab'); // 'vocab', 'read', 'quiz'

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="mb-8 text-center">
                        <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">My English Hub</h1>
                        <p className="text-slate-500">Personalized learning database powered by daily reading.</p>
                    </header>

                    <nav className="flex justify-center gap-2 mb-8 bg-white p-2 rounded-2xl shadow-sm border border-slate-100 max-w-fit mx-auto">
                        <button 
                            onClick={() => setActiveTab('vocab')}
                            className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-colors ${activeTab === 'vocab' ? 'bg-blue-100 text-blue-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                            單字庫 Vocab
                        </button>
                        <button 
                            onClick={() => setActiveTab('read')}
                            className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-colors ${activeTab === 'read' ? 'bg-blue-100 text-blue-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                            文章閱讀 Reading
                        </button>
                        <button 
                            onClick={() => setActiveTab('quiz')}
                            className={`px-6 py-2.5 rounded-xl text-sm font-medium transition-colors ${activeTab === 'quiz' ? 'bg-blue-100 text-blue-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                            每日測驗 Quiz
                        </button>
                    </nav>

                    <main>
                        {activeTab === 'vocab' && <VocabularyList />}
                        {activeTab === 'read' && <ArticleReader />}
                        {activeTab === 'quiz' && <Quiz />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
